[module/bluetooth]
type = custom/script
exec = ~/Scripts/bluetooth.sh
interval = 2
click-left = exec blueberry
click-right = exec ~/Scripts/toggle_bluetooth.sh
format-foreground = #ffffff

[module/fecha]
type = custom/script
exec = ~/Scripts/muestraFecha.sh
interval = 30
click-left = java -jar ~/Scripts/calendario.jar
format-foreground = #ffffff

[module/dunst]
type = custom/script
exec = ~/Scripts/dunst.sh
interval = 2
click-right = ~/Scripts/alternaNotificaciones.sh &
click-left = ~/Scripts/muestraNotificaciones.sh &
format-foreground = #ffffff

[module/powerlauncher]
type = custom/menu

; If true, <label-toggle> will be to the left of the menu items (default).
; If false, it will be on the right of all the items.
expand-right = true

; "menu-LEVEL-N" has the same properties as "label-NAME" with
; the additional "exec" property
;
; Available exec commands:
;   menu-open-LEVEL
;   menu-close
; Other commands will be executed using "/usr/bin/env sh -c $COMMAND"
menu-0-0 = " MenГә |"
menu-0-0-exec = rofi -no-config -no-lazy-grab -show drun -modi drun -theme ~/Scripts/Temas/launcherIzq.rasi &
menu-0-1 = " Suspend |"
menu-0-1-exec = systemctl suspend
menu-0-2 = " Shutdown |"
menu-0-2-exec = menu-open-2
menu-0-3 = " Reboot "
menu-0-3-exec = menu-open-1

menu-1-0 = " Back |"
menu-1-0-exec = menu-open-0
menu-1-1 = " Reboot "
menu-1-1-exec = systemctl reboot

menu-2-0 = " Shutdown |"
menu-2-0-exec = systemctl poweroff
menu-2-1 = " Back "
menu-2-1-exec = menu-open-0

; Available tags:
;   <label-toggle> (default) - gets replaced with <label-(open|close)>
;   <menu> (default)
; Note that if you use <label-toggle> you must also include
; the definition for <label-open>

format = <label-toggle><menu>

label-open = оғқ
label-open-foreground = ${color.pmenu}
label-open-padding = 0
label-close = оҠӮ
label-close-foreground = ${color.pmenu-2}
label-close-padding = 1

; Optional item separator
; Default: none
;label-separator = " | "
;label-separator-foreground = ${color.foreground}
;label-separator-background = ${color.background-alt}

;;label-open-foreground = ${color.foreground}
;;label-close-foreground = ${color.background}

[module/updates]
type = custom/script

; Available tokens:
;   %counter%
; Command to be executed (using "/usr/bin/env sh -c [command]")
exec = ~/.config/polybar/forest/scripts/updates.sh

; Conditional command that, if defined, needs to exit successfully
; before the main exec command is invoked.
; Default: ""
;;exec-if = ""

; Will the script output continous content?
; Default: false
tail = true

; Seconds to sleep between updates
; Default: 2 (0 if `tail = true`)
interval = 5

; Available tags:
;   <output> - deprecated
;   <label> (default)
format = <label>
format-prefix = оғҲ
format-prefix-foreground = ${color.yellow}

; Available tokens:
;   %output%
; Default: %output%
label = " %output%"

; Available tokens:
;   %counter%
;   %pid%
;
; "click-(left|middle|right)" will be executed using "/usr/bin/env sh -c [command]"
click-left = exo-open --launch TerminalEmulator &
click-right = 
;;double-click-left = echo double left %counter%
;;double-click-middle = echo double middle %counter%
;;double-click-right = echo double right %counter%

; Available tokens:
;   %counter%
;   %pid%
;
; "scroll-(up|down)" will be executed using "/usr/bin/env sh -c [command]"
;;scroll-up = echo scroll up %counter%
;;scroll-down = echo scroll down %counter%


